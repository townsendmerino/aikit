<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>gemma-web</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --user:#2a3550; --model:#222730; --txt:#e6e8ec; --mut:#8a90a0; --acc:#6ea8fe; --bd:#262b36; --warn:#e0a458; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 system-ui,sans-serif; background:var(--bg); color:var(--txt); height:100vh; display:flex; flex-direction:column; }
  header { padding:10px 16px; border-bottom:1px solid var(--bd); display:flex; align-items:baseline; gap:10px; }
  header b { font-weight:600; }
  header .mut { color:var(--mut); font-size:13px; }
  details.settings { border-bottom:1px solid var(--bd); }
  details.settings > summary { padding:8px 16px; cursor:pointer; color:var(--mut); font-size:13px; user-select:none; }
  .settings-body { padding:4px 16px 14px; display:grid; grid-template-columns:1fr 1fr; gap:12px 24px; }
  .settings-body label { display:block; font-size:12px; color:var(--mut); margin-bottom:3px; }
  .settings-body .full { grid-column:1 / -1; }
  textarea, input[type=number] { width:100%; background:var(--bg); color:var(--txt); border:1px solid var(--bd); border-radius:7px; padding:7px 9px; font:inherit; }
  textarea { resize:vertical; }
  .slider { display:flex; align-items:center; gap:10px; }
  .slider input[type=range] { flex:1; }
  .slider output { min-width:34px; text-align:right; color:var(--txt); font-variant-numeric:tabular-nums; }
  #stats { padding:5px 16px; font-size:12px; color:var(--mut); border-bottom:1px solid var(--bd); font-variant-numeric:tabular-nums; min-height:27px; }
  #transcript { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .bubble { max-width:78%; padding:8px 12px; border-radius:10px; white-space:pre-wrap; word-wrap:break-word; }
  .user  { background:var(--user); align-self:flex-end; }
  .model { background:var(--model); align-self:flex-start; }
  .model.empty::after { content:'▌'; color:var(--mut); animation:blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity:0; } }
  form { display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--bd); align-items:flex-end; }
  #input { flex:1; }
  .btns { display:flex; gap:8px; }
  button { background:var(--acc); color:#08121f; border:0; border-radius:8px; padding:9px 16px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--txt); border:1px solid var(--bd); }
  button:disabled { opacity:.45; cursor:default; }
</style>
</head>
<body>
<header>
  <b>gemma-web</b>
  <span class="mut" id="status">ready</span>
</header>

<details class="settings">
  <summary>settings — system prompt &amp; sampling</summary>
  <div class="settings-body">
    <div class="full">
      <label for="system">system prompt</label>
      <textarea id="system" rows="2" placeholder="(optional) instructions folded into the first user turn"></textarea>
    </div>
    <div>
      <label for="temperature">temperature <span class="mut">(0 = greedy)</span></label>
      <div class="slider"><input type="range" id="temperature" min="0" max="2" step="0.05" value="0"><output id="temperature_v">0.00</output></div>
    </div>
    <div>
      <label for="topP">top-p <span class="mut">(0 = off)</span></label>
      <div class="slider"><input type="range" id="topP" min="0" max="1" step="0.05" value="0"><output id="topP_v">0.00</output></div>
    </div>
    <div>
      <label for="topK">top-k <span class="mut">(0 = off)</span></label>
      <input type="number" id="topK" min="0" step="1" value="0">
    </div>
    <div>
      <label for="maxTokens">max tokens</label>
      <input type="number" id="maxTokens" min="1" max="2048" step="1" value="256">
    </div>
    <div>
      <label for="seed">seed</label>
      <input type="number" id="seed" step="1" value="0">
    </div>
  </div>
</details>

<div id="stats">&nbsp;</div>
<div id="transcript"></div>

<form id="form">
  <textarea id="input" rows="2" placeholder="Message… (Enter to send, Shift+Enter for newline)"></textarea>
  <div class="btns">
    <button id="send" type="submit">Send</button>
    <button id="stop" type="button" class="ghost" disabled>Stop</button>
    <button id="regen" type="button" class="ghost" disabled>Regenerate</button>
  </div>
</form>

<script>
const messages = [];                 // {role:'user'|'model', content} — full state, sent every request
const $ = (id) => document.getElementById(id);
const transcript = $('transcript');
let busy = false, abort = null, reqStart = 0;

// --- sampling controls -------------------------------------------------------
for (const id of ['temperature', 'topP']) {
  const el = $(id), out = $(id + '_v');
  const sync = () => out.textContent = (+el.value).toFixed(2);
  el.addEventListener('input', sync); sync();
}
function sampling() {
  return {
    system: $('system').value,
    temperature: +$('temperature').value,
    topK: +$('topK').value,
    topP: +$('topP').value,
    seed: +$('seed').value,
    maxTokens: +$('maxTokens').value,
  };
}

// --- transcript --------------------------------------------------------------
function render() {
  transcript.innerHTML = '';
  for (const m of messages) addBubble(m.role, m.content);
  transcript.scrollTop = transcript.scrollHeight;
}
function addBubble(role, text) {
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  div.textContent = text;
  transcript.appendChild(div);
  transcript.scrollTop = transcript.scrollHeight;
  return div;
}
function setBusy(b) {
  busy = b;
  $('send').disabled = b;
  $('stop').disabled = !b;
  $('regen').disabled = b || !messages.some(m => m.role === 'model');
}

// --- SSE over fetch (EventSource is GET-only; we POST) -----------------------
async function readSSE(resp, onEvent) {
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  for (;;) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    let i;
    while ((i = buf.indexOf('\n\n')) >= 0) {
      const block = buf.slice(0, i); buf = buf.slice(i + 2);
      let event = 'message', data = '';
      for (const line of block.split('\n')) {
        if (line.startsWith('event:')) event = line.slice(6).trim();
        else if (line.startsWith('data:')) data += line.slice(5).trim();
      }
      onEvent(event, data ? JSON.parse(data) : {});
    }
  }
}

function showStats({ n, ttft, done, tps, prompt }) {
  let s = `tokens: ${n}`;
  if (tps) s += ` · ${tps.toFixed(1)} tok/s`;
  if (ttft != null) s += ` · TTFT ${ttft} ms`;
  if (prompt != null) s += ` · prompt ${prompt}`;
  if (done) s += ' · done';
  $('stats').textContent = s;
}

// --- generation --------------------------------------------------------------
// Precondition: messages ends with a user turn. Streams a model reply into a
// fresh bubble and appends it to messages.
async function generate() {
  const bubble = addBubble('model', '');
  bubble.classList.add('empty');
  setBusy(true);
  $('status').textContent = 'generating…';
  abort = new AbortController();
  reqStart = performance.now();
  let reply = '', n = 0, firstAt = 0;
  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, ...sampling() }),
      signal: abort.signal,
    });
    if (resp.status === 409) { bubble.classList.remove('empty'); bubble.textContent = '[busy — another generation is in flight]'; return; }
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    await readSSE(resp, (event, data) => {
      if (event === 'token') {
        if (!firstAt) firstAt = performance.now();
        reply += data.text; n = data.n ?? n;
        bubble.classList.remove('empty');
        bubble.textContent = reply;
        transcript.scrollTop = transcript.scrollHeight;
        const secs = (performance.now() - firstAt) / 1000;
        showStats({ n, ttft: Math.round(firstAt - reqStart), tps: secs > 0 ? n / secs : 0 });
      } else if (event === 'done') {
        showStats({ n: data.tokens, ttft: data.ttftMs, tps: data.tokPerSec, prompt: data.promptTokens, done: true });
      } else if (event === 'error') {
        bubble.classList.remove('empty');
        bubble.textContent = reply + '  [error: ' + data.message + ']';
      }
    });
  } catch (e) {
    if (e.name !== 'AbortError') { bubble.classList.remove('empty'); bubble.textContent = reply + '  [error: ' + e.message + ']'; }
    else $('status').textContent = 'stopped';
  } finally {
    bubble.classList.remove('empty');
    if (reply) messages.push({ role: 'model', content: reply }); // keep partial on stop
    else if (bubble.parentNode) bubble.remove();
    abort = null;
    setBusy(false);
    if ($('status').textContent === 'generating…') $('status').textContent = 'ready';
  }
}

function sendUser(text) {
  messages.push({ role: 'user', content: text });
  addBubble('user', text);
  generate();
}

// Regenerate: drop the last model reply and re-run from the same user turn.
function regenerate() {
  if (busy) return;
  if (messages.length && messages[messages.length - 1].role === 'model') messages.pop();
  render();
  if (messages.length && messages[messages.length - 1].role === 'user') generate();
}

// --- wiring ------------------------------------------------------------------
$('form').addEventListener('submit', (e) => {
  e.preventDefault();
  if (busy) return;
  const text = $('input').value.trim();
  if (!text) return;
  $('input').value = '';
  sendUser(text);
});
$('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); $('form').requestSubmit(); }
});
$('stop').addEventListener('click', () => { if (abort) abort.abort(); });
$('regen').addEventListener('click', regenerate);
</script>
</body>
</html>
