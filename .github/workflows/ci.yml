name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: root module (pure-Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"; echo "$unformatted"; exit 1
          fi

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...

      # Core-cleanliness guard (migration-plan §7/§9): the root module must
      # stay pure-Go — no cgo WebGPU, no tree-sitter. Those live in the
      # goinfer/gpu and aikit/chunk/treesitter modules respectively.
      - name: no cgo deps in core graph
        run: |
          leak="$(go list -deps ./... | grep -Ei 'webgpu|gotreesitter' || true)"
          if [ -n "$leak" ]; then
            echo "core module pulled a quarantined dep:"; echo "$leak"; exit 1
          fi

      # CGO_ENABLED=0 must build — proves the core is genuinely cgo-free.
      - name: build with cgo disabled
        env:
          CGO_ENABLED: "0"
        run: go build ./...

      # Model-dependent tests skip cleanly when assets are absent (as on CI).
      - name: test (race)
        run: go test -race ./...

      # Short fuzz smoke on the untrusted binary parsers (GGUF / safetensors).
      # The committed seed + regression corpus runs under the race step above on
      # every push; this adds a brief active-fuzz pass to catch new inputs. A
      # longer nightly run is a follow-up (roadmap §3.1).
      - name: fuzz (smoke)
        run: |
          for fn in FuzzParseGGUF FuzzParseSafetensors FuzzParseShardIndex FuzzGGUFDequant; do
            go test ./embed/ -run xxx -fuzz="^$fn\$" -fuzztime=20s
          done

  treesitter:
    name: chunk/treesitter submodule
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      # Separate module; resolves the published aikit from the proxy. cgo is
      # expected here (gotreesitter) — that's why it's quarantined.
      - name: build + test
        working-directory: chunk/treesitter
        run: |
          go build ./...
          go vet ./...
          go test ./...

  windows:
    name: windows (pure-Go core)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      # The core has no cgo, so it builds + tests on Windows with no toolchain.
      # The mmap loaders fall back to a heap read here (embed/mmap_other.go).
      # No -race: the Windows race detector needs a cgo C toolchain.
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
